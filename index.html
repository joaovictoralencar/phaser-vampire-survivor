<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <title>BackToPhaser</title>
    <style>
        /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            line-height: 1;
            font-family: Arial, sans-serif;
            background-color: #040218;
        }

        ol,
        ul {
            list-style: none;
        }

        img,
        video {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <script src="./phaser.js"></script>
    <script src="src/SoundManager.js"></script>
    <script src="./src/DamageText.js"></script>
    <script src="./src/HealthComponent.js"></script>
    <script src="./src/AttackComponent.js"></script>
    <script src="./src/Player.js"></script>
    <script src="./src/Enemy.js"></script>
    <script src="./src/scenes/Survivor.js"></script>
    <script src="./src/main.js"></script>
</body>

</html>
